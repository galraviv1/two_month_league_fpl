name: Refresh live picks

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-picks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run refresh-picks script
        run: node scripts/refresh-picks.mjs

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/live-picks.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/live-picks.json
            git commit -m "chore: refresh live picks"
            git push
          else
            echo "No changes to commit."
          fi
